<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;600;700;900&family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body>

  <nav class="navbar">
    <div class="nav-inner">
      <a href="/" class="nav-logo">
        <span class="logo-emblem">⚖</span>
        <div class="logo-text-wrap">
          <span class="logo-title">생활법률 이야기</span>
          <span class="logo-sub">알아두면 힘이 되는 법</span>
        </div>
      </a>
      <div class="nav-links">
        <a href="/">홈</a>
        <a href="/categories">카테고리</a>
        <a href="/about">소개</a>
      </div>
    </div>
  </nav>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-top">
        <div class="footer-brand">
          <span class="footer-emblem">⚖</span>
          <p class="footer-title">생활법률 이야기</p>
          <p class="footer-desc">{{ site.description }}</p>
        </div>
        <div class="footer-disclaimer">
          <p class="disclaimer-title">⚠ 법적 고지</p>
          <p class="disclaimer-text">본 블로그의 내용은 일반적인 법률 정보 제공을 목적으로 하며, 법률 자문이 아닙니다. 구체적인 법률 문제는 반드시 전문 변호사와 상담하시기 바랍니다.</p>
        </div>
      </div>
      <div class="footer-bottom">
        <p>© {{ site.time | date: "%Y" }} 생활법률 이야기. All rights reserved.</p>
      </div>
    </div>
  </footer>

</body>
</html>
